<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quy Nhơn Trip</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center min-h-screen flex items-center justify-center bg-no-repeat bg-cover bg-center"
    style="
      background-image: url(&quot;https://mia.vn/media/uploads/blog-du-lich/bai-bien-quy-nhon-1-1760493903.jpg&quot;);
    "
  >
    <div
      class="bg-white rounded-2xl bg-gradient-to-br from-blue-100 to-blue-300 shadow-xl p-6 w-[95%] max-w-2xl text-center min-h-[70vh]"
    >
      <h1 class="text-2xl font-bold mb-4">📍 Quy Nhơn Trip</h1>

      <!-- Tabs -->
      <div class="flex gap-3 overflow-x-auto">
        <button
          id="btn-plan"
          onclick="showTab('plan')"
          class="px-4 py-2 bg-blue-500 text-white rounded-xl"
        >
          Lịch trình
        </button>
        <button
          id="btn-places"
          onclick="showTab('places')"
          class="px-4 py-2 bg-gray-300 rounded-xl"
        >
          Địa điểm
        </button>
        <button
          id="btn-money"
          onclick="showTab('money')"
          class="px-4 py-2 bg-gray-300 rounded-xl"
        >
          💸 Chi phí
        </button>
        <button
          onclick="window.location.href = 'upload.html'"
          class="bg-green-500 text-white px-4 py-2 rounded"
        >
          📷 Upload ảnh
        </button>
        <a
          href="temple.html"
          class="px-4 py-2 bg-yellow-400 rounded-xl text-white"
        >
          🛕 Đi chùa
        </a>
      </div>

      <!-- Content -->
      <div
        id="content"
        class="flex flex-col justify-center text-left space-y-2 text-gray-700 min-h-[300px]"
      ></div>

      <!-- Navigation -->
      <div id="nav" class="flex justify-between mt-6">
        <button onclick="prevDay()" class="px-4 py-2 bg-gray-300 rounded-xl">
          ⬅️ Prev
        </button>
        <button
          onclick="nextDay()"
          class="px-4 py-2 bg-blue-500 text-white rounded-xl"
        >
          Next ➡️
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getDatabase,
        ref,
        onValue,
        set,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDVIJoFMl3iZUMGNKMPyu1HF977f8qkQMM",
        authDomain: "quynhon-trip.firebaseapp.com",
        databaseURL:
          "https://quynhon-trip-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "quynhon-trip",
        storageBucket: "quynhon-trip.firebasestorage.app",
        messagingSenderId: "778325151594",
        appId: "1:778325151594:web:4a9d4d776ef0bae67adf13",
        measurementId: "G-6T1QNTNESD",
      };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // 🔥 GLOBAL
      let expenses = [];
      window.expenses = expenses;

      // 🔥 realtime load
      onValue(ref(db, "expenses"), (snapshot) => {
        expenses = snapshot.val() || [];
        window.expenses = expenses;
        render();
      });

      // 🔥 add expense (GLOBAL để HTML gọi được)
      window.addExpense = function () {
        const person = document.getElementById("person").value;
        const desc = document.getElementById("desc").value;
        let amount = document.getElementById("amount").value;

        if (!person || !amount) return;

        amount = Number(amount.replace(/\D/g, ""));

        expenses.push({ person, desc, amount });

        set(ref(db, "expenses"), expenses);
      };

      let mode = "plan";
      let current = 0;

      const days = [
        {
          title: "Ngày 25 (Xuất phát)",
          items: [
            "13:30 - Tập trung nhà Quốc",
            "14:00 - Xuất phát",
            "20:00 - Tới nơi, nhận phòng",
            "21:00 - Dạo biển + ăn nhẹ (Bún cá)",
            "22:00 - Về ngủ",
          ],
        },
        {
          title: "Ngày 26 (Kỳ Co - Eo Gió)",
          items: [
            "07:30 - Đi ăn sáng(Bánh hỏi cháo lòng)",
            "08:30 - Đi Kỳ Co",
            "09:00 - 12:00 Tắm biển + lặn",
            "12:00 - Ăn trưa",
            "14:00 - Đi Eo Gió",
            "16:30 - Về nghỉ ngơi",
            "18:00 - Đi phố ăn đêm, uống sữa, ẩm thực đường phố",
            "20:30 - Đi quảng trường Nguyễn Tất Thành",
            "22:00 - Về nghỉ ngơi",
          ],
        },
        {
          title: "Ngày 27 (City Tour)",
          items: [
            "08:00 - Hòn Khô",
            "12:00 - Ăn trưa",
            "14:00 - ExploraScience",
            "16:00 - Cafe Surf Bar",
            "18:00 - Về khách sạn nghỉ ngơi",
            "19:00 - Ăn hải sản",
            "22:30 - Về nghỉ ngơi chuẩn bị về",
          ],
        },
        {
          title: "Ngày 28",
          items: ["07:00 - Tắm biển + cafe", "12:00 - Ăn trưa", "14:00 - Về"],
        },
      ];

      const places = [
        {
          name: "Khách sạn",
          map: "https://www.google.com/maps/place/FLC+Sea+Tower/@13.755511,109.2144087,18z/data=!4m9!3m8!1s0x316f6ce8db0947e1:0x29c154825ef759cd!5m2!4m1!1i2!8m2!3d13.7556439!4d109.21487!16s%2Fg%2F11csryy0ls?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Kỳ Co",
          map: "https://www.google.com/maps/place/Ky+Co+Beach/@13.8488146,109.222172,13.5z/data=!4m10!1m2!2m1!1sKy+Co+Quy+Nhon!3m6!1s0x316f69f22c9fe315:0x2307fe5753f84473!8m2!3d13.8499207!4d109.291844!15sCg5LeSBDbyBRdXkgTmhvbloQIg5reSBjbyBxdXkgbmhvbpIBEnRvdXJpc3RfYXR0cmFjdGlvbpoBRENpOURRVWxSUVVOdlpFTm9kSGxqUmpsdlQyeFdTR0V6WkhaV01UaDBVakpTYTFKdE5USmtXRW96WVZaQ1FsZEZSUkFC4AEA-gEFCK0BECQ!16s%2Fg%2F11c5rsmsnn?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Eo Gió",
          map: "https://www.google.com/maps/place/Khu+Du+L%E1%BB%8Bch+Eo+Gi%C3%B3/@13.8861086,109.271993,14z/data=!4m10!1m2!2m1!1sEo+Gio+Quy+Nhon!3m6!1s0x316f43bbd047c227:0xb6f5a42174801909!8m2!3d13.8849658!4d109.2921603!15sCg9FbyBHaW8gUXV5IE5ob26SARJ0b3VyaXN0X2F0dHJhY3Rpb27gAQA!16s%2Fg%2F11j9cz2zrs?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Tháp Đôi",
          map: "https://www.google.com/maps?q=Thap+Doi+Quy+Nhon",
        },
        {
          name: "Ghềnh Ráng - Hàn Mạc Tử",
          map: "https://www.google.com/maps/place/B%C3%A3i+tr%E1%BB%A9ng+-+khu+du+l%E1%BB%8Bch+Gh%E1%BB%81nh+R%C3%A1ng/@13.7442385,109.2103203,16.5z/data=!4m10!1m2!2m1!1sGhenh+Rang+Tien+Sa!3m6!1s0x316f6ce1c482d797:0x7cbc4cd34058945b!8m2!3d13.7423125!4d109.2158125!15sChJHaGVuaCBSYW5nIFRpZW4gU2FaFCISZ2hlbmggcmFuZyB0aWVuIHNhkgESdG91cmlzdF9hdHRyYWN0aW9umgFEQ2k5RFFVbFJRVU52WkVOb2RIbGpSamx2VDJrd2VWSkViR1pOV0dONFVsUkNRbGRZV21aaFZXUk5VbTFvY2s1dFl4QULgAQD6AQQIYxBJ!16s%2Fg%2F11bx98r806?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Surf Bar 1",
          map: "https://www.google.com/maps/place/Surf+bar+1/@13.770338,109.2351751,18.25z/data=!4m10!1m2!2m1!1sSurf+Bar+Quy+Nhon!3m6!1s0x316f6c628660e887:0x9a3f40efc7259557!8m2!3d13.7701389!4d109.2355944!15sChFTdXJmIEJhciBRdXkgTmhvbloTIhFzdXJmIGJhciBxdXkgbmhvbpIBBGNhZmXgAQA!16s%2Fg%2F11cn9m0yly?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Surf Bar 2",
          map: "https://www.google.com/maps/place/Surf+bar+2/@13.770338,109.2351751,18.25z/data=!4m10!1m2!2m1!1sSurf+Bar+Quy+Nhon!3m6!1s0x316f6daefcdda8fb:0x48c8661daf9ffdd7!8m2!3d13.7705251!4d109.2366351!15sChFTdXJmIEJhciBRdXkgTmhvbloTIhFzdXJmIGJhciBxdXkgbmhvbpIBA2JhcuABAA!16s%2Fg%2F11t6mpltx5?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "ExploraScience",
          map: "https://www.google.com/maps?q=ExploraScience+Quy+Nhon",
        },
        {
          name: "Biển Quy Nhơn",
          map: "https://www.google.com/maps?q=Bien+Quy+Nhon",
        },
        {
          name: "Quảng trường Nguyễn Tất Thành",
          map: "https://www.google.com/maps/place/Qu%E1%BA%A3ng+tr%C6%B0%E1%BB%9Dng+Nguy%E1%BB%85n+T%E1%BA%A5t+Th%C3%A0nh/@13.7621362,109.2194968,17z/data=!3m1!4b1!4m6!3m5!1s0x316f6ced3ad12b5b:0x1dcc1819616e3a7d!8m2!3d13.7621362!4d109.2220717!16s%2Fg%2F11ckvvzvsh?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
      ];

      const diningPlaces = [
        {
          name: "Phố ẩm thực Ngô Văn Sở",
          map: "https://www.google.com/maps/place/Ph%E1%BB%91+%E1%BA%A9m+th%E1%BB%B1c+Quy+Nh%C6%A1n/@13.7645214,109.2193788,17z/data=!3m1!4b1!4m6!3m5!1s0x316f6d03908b946d:0xc11760da2b7716d2!8m2!3d13.7645214!4d109.2242497!16s%2Fg%2F11flbsr8_h?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Phố ẩm thực Phan Bội Châu",
          map: "https://www.google.com/maps/place/Ph%E1%BB%91+%E1%BA%A9m+th%E1%BB%B1c+Phan+B%E1%BB%99i+Ch%C3%A2u/@13.7730929,109.2330816,16.5z/data=!4m6!3m5!1s0x316f6df8a17a2ec9:0x4c268bc90502d7c7!8m2!3d13.7736842!4d109.2353321!16s%2Fg%2F11kjpsrvk7?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Gỏi cá Thanh Kiều 69/1 Trần Hưng Đạo",
          map: "https://www.google.com/maps/place/G%E1%BB%8Fi+c%C3%A1+X%E1%BB%A9+N%E1%BA%ABu/@13.7721046,109.2422968,17z/data=!3m1!4b1!4m6!3m5!1s0x316f6d00318fb843:0x3d507ddbf5b3fee1!8m2!3d13.7721046!4d109.2471677!16s%2Fg%2F11w3fgrwz1?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Bánh hỏi cháo lòng Hồng Thanh 22 Phan Bội Châu",
          map: "https://www.google.com/maps/place/B%C3%A1nh+h%E1%BB%8Fi+ch%C3%A1o+l%C3%B2ng+H%E1%BB%93ng+Thanh/@13.7736711,109.2333328,17z/data=!3m1!4b1!4m6!3m5!1s0x316f6c7d5701bb07:0xaa7697c9cfa66e60!8m2!3d13.7736711!4d109.2359077!16s%2Fg%2F11gd1wc5_k?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
        {
          name: "Nước đậu sương sáo Cô Năm",
          map: "https://www.google.com/maps/place/N%C6%B0%E1%BB%9Bc+%C4%91%E1%BA%ADu+s%C6%B0%C6%A1ng+s%C3%A1o+C%C3%94+N%C4%82M/@13.7687594,109.2289945,17z/data=!3m1!4b1!4m6!3m5!1s0x316f6d21cc6e4fc7:0x75b1ac325537fe2d!8m2!3d13.7687542!4d109.2315694!16s%2Fg%2F11g0gbgts0?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D",
        },
      ];

      function render() {
        const content = document.getElementById("content");
        const nav = document.getElementById("nav");
        updateTabStyle();
        const prevBtn = nav.children[0];
        const nextBtn = nav.children[1];

        if (current === 0) {
          prevBtn.style.visibility = "hidden";
        } else {
          prevBtn.style.visibility = "visible";
        }

        if (current === days.length - 1) {
          nextBtn.style.visibility = "hidden";
        } else {
          nextBtn.style.visibility = "visible";
        }
        if (mode === "plan") {
          nav.style.display = "flex";
          const day = days[current];
          content.innerHTML = `
      <h2 class="text-xl font-semibold mb-2">${day.title}</h2>
      ${day.items.map((i) => `<p>• ${i}</p>`).join("")}
    `;
        } else if (mode === "places") {
          nav.style.display = "none";
          content.innerHTML = `
      <h2 class="text-xl font-semibold mb-2">📍 Danh sách địa điểm check-in</h2>
      ${places.map((p) => `<p>• <a href="${p.map}" target="_blank" class="text-blue-600 underline">${p.name}</a></p>`).join("")}
      <h2 class="text-xl font-semibold mb-2">📍 Danh sách địa điểm ăn uống</h2>
      ${diningPlaces.map((p) => `<p>• <a href="${p.map}" target="_blank" class="text-blue-600 underline">${p.name}</a></p>`).join("")}
    `;
        } else {
          nav.style.display = "none";

          // 🔥 đảm bảo expenses luôn là array
          const list = expenses || [];

          const total = list.reduce((s, e) => s + Number(e.amount || 0), 0);

          const TOTAL_PEOPLE = 5;
          const per = Math.round(total / TOTAL_PEOPLE);

          content.innerHTML = `
    <h2 class="text-xl font-semibold mb-2">💸 Chi phí</h2>

    <div class="flex gap-2 mb-2">
      <input id="person" placeholder="Người trả"
        class="border p-2 w-1/3 rounded" />
        <input id="desc" placeholder="Nội dung"
      class="border p-2 w-1/2 rounded" />

      <input id="amount"
    type="text"
    placeholder="Số tiền"
    oninput="formatInput(this)"
    class="border p-2 w-1/2 rounded" />
    </div>

    <button onclick="addExpense()"
      class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded w-full">
      Thêm
    </button>

    <div class="mt-4 space-y-1">
      ${
        list.length === 0
          ? `<p class="text-gray-400">Chưa có chi phí</p>`
          : list
              .map(
                (e, i) => `
          <p class="flex justify-between items-center">
            <span>• <b>${e.person} - ${e.desc || ""}:</b> ${Number(e.amount).toLocaleString()}đ</span>

            <span class="flex gap-2">
              <button onclick="deleteExpense(${i})" class="text-red-500">Xoá</button>
            </span>
          </p>
        `,
              )
              .join("")
      }
    </div>

    <hr class="my-3"/>

    <p><b>Tổng:</b> ${total.toLocaleString()}đ</p>
    <p><b>Mỗi người:</b> ${per.toLocaleString()}đ</p>
  `;
        }
      }

      window.nextDay = function () {
        if (current < days.length - 1) {
          current++;
          render();
        }
      };

      window.prevDay = function () {
        if (current > 0) {
          current--;
          render();
        }
      };

      window.showTab = function (tab) {
        mode = tab;
        render();
      };
      function updateTabStyle() {
        const planBtn = document.getElementById("btn-plan");
        const placesBtn = document.getElementById("btn-places");
        const moneyBtn = document.getElementById("btn-money");
        if (mode === "plan") {
          planBtn.className = "px-4 py-2 bg-blue-500 text-white rounded-xl";
          placesBtn.className = "px-4 py-2 bg-gray-300 rounded-xl";
          moneyBtn.className = "px-4 py-2 bg-gray-300 rounded-xl";
        } else if (mode === "places") {
          planBtn.className = "px-4 py-2 bg-gray-300 rounded-xl";
          placesBtn.className = "px-4 py-2 bg-blue-500 text-white rounded-xl";
          moneyBtn.className = "px-4 py-2 bg-gray-300 rounded-xl";
        } else {
          planBtn.className = "px-4 py-2 bg-gray-300 rounded-xl";
          placesBtn.className = "px-4 py-2 bg-gray-300 rounded-xl";
          moneyBtn.className = "px-4 py-2 bg-blue-500 text-white rounded-xl";
        }
      }
      window.formatInput = function (el) {
        let value = el.value;

        let cursorPos = el.selectionStart;

        let rawBeforeCursor = value
          .slice(0, cursorPos)
          .replace(/\D/g, "").length;

        let raw = value.replace(/\D/g, "");

        if (!raw) {
          el.value = "";
          return;
        }

        let formatted = Number(raw).toLocaleString("en-US") + " đ";
        el.value = formatted;

        let count = 0;
        let newPos = 0;

        for (let i = 0; i < el.value.length; i++) {
          if (/\d/.test(el.value[i])) count++;
          if (count === rawBeforeCursor) {
            newPos = i + 1;
            break;
          }
        }
        if (!newPos) newPos = el.value.length - 2;

        el.setSelectionRange(newPos, newPos);
      };
      function formatVND(value) {
        const number = value.replace(/\D/g, "");
        if (!number) return "";
        return Number(number).toLocaleString("en-US") + " đ";
      }
      setTimeout(() => {
        const input = document.getElementById("amount");
        if (!input) return;

        input.addEventListener("input", (e) => {
          const raw = e.target.value.replace(/\D/g, "");
          e.target.value = formatVND(raw);
        });
      }, 0);

      window.deleteExpense = function (index) {
        if (!confirm("Xoá khoản này?")) return;

        expenses.splice(index, 1);
        set(ref(db, "expenses"), expenses);
      };

      render();
    </script>
  </body>
</html>
